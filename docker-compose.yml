version: '3.9'

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: haulage_db
      POSTGRES_USER: haulage_user
      POSTGRES_PASSWORD: haulage_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haulage_user -d haulage_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: "docker-dev-secret-key-change-in-production"
      DEBUG: "False"
      USE_POSTGRES: "True"
      DB_HOST: db
      DB_NAME: haulage_db
      DB_USER: haulage_user
      DB_PASSWORD: haulage_pass
      DB_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '>>> Running migrations...' &&
        python manage.py migrate --noinput &&
        echo '>>> Seeding demo data...' &&
        python manage.py seed_data &&
        echo '>>> Collecting static files...' &&
        python manage.py collectstatic --noinput &&
        echo '>>> Starting Gunicorn...' &&
        gunicorn haulage_project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile - --error-logfile -
      "

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
